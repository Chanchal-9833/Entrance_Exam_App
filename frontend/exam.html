<!DOCTYPE html>
<html>
<head>
  <title>Online Exam</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div>👤 <span id="user"></span></div>
  <div id="timer"></div>
</div>

<div class="container">

  <!-- LEFT -->
  <div class="question-section">
    <div id="questionBox"></div>

    <div class="controls">
    <button class="prev-btn" onclick="prev()">Prev</button>
<button class="mark-btn" onclick="markReview()">Mark</button>
<button class="next-btn" onclick="next()">Next</button>
<button class="submit" onclick="submitExam()">Submit</button>
    </div>
  </div>

  <!-- RIGHT -->
   
  <div class="palette-section">
    
    <h3>Question Palette</h3>
    <div class="section-tabs">
  <button onclick="showSection('A')" id="tab-A">A</button>
  <button onclick="showSection('B')" id="tab-B">B</button>
  <button onclick="showSection('C')" id="tab-C">C</button>
  <button onclick="showSection('D')" id="tab-D">D</button>
</div>
    <div id="palette" class="palette"></div>

    <div class="legend">
      <p><span class="box gray"></span> Not Visited</p>
      <p><span class="box red"></span> Not Answered</p>
      <p><span class="box green"></span> Answered</p>
      <p><span class="box purple"></span> Marked</p>
    </div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
